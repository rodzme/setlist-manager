<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Setlist Lyrics</title>
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Setlist Lyrics">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg: #0f0f10;
      --panel: #1a1a1d;
      --text: #f4f4f5;
      --muted: #aaa;
      --line: #2d2d31;
      --accent: #f5b342;
      --ok: #4ade80;
      --err: #f87171;
    }

    * { box-sizing: border-box }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #app {
      padding: 18px;
      max-width: 900px;
      margin: auto;
    }

    h1 { margin: 0 0 14px }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    button, input, textarea, select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
    }

    button.primary {
      background: var(--accent);
      color: #111;
      font-weight: 700;
    }

    button:disabled { opacity: 0.5 }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar input { flex: 1; min-width: 160px }

    .sync-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .sync-card h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .sync-hint {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 12px;
      line-height: 1.4;
    }

    .sync-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .sync-row input { flex: 1; min-width: 140px }

    .sync-status {
      font-size: 14px;
      margin-top: 8px;
      color: var(--muted);
    }

    .sync-status.ok { color: var(--ok) }
    .sync-status.err { color: var(--err) }

    .sync-id-box {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      word-break: break-all;
      background: var(--bg);
      padding: 10px;
      border-radius: 10px;
      margin: 8px 0;
      border: 1px solid var(--line);
    }

    .card {
      background: var(--panel);
      padding: 14px;
      border-radius: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
    }

    pre {
      white-space: pre-wrap;
      font-size: 20px;
      line-height: 1.6;
      background: var(--panel);
      padding: 18px;
      border-radius: 18px;
      overflow: auto;
    }

    .hidden { display: none }

    textarea { width: 100%; min-height: 300px }
    input { width: 100% }

    #viewer { padding-bottom: 120px }

    .inline-panel {
      margin: 0 0 16px;
    }

    #panelStash {
      display: none;
    }

    .card.is-active {
      border-color: var(--accent);
    }

    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: #00000099;
      padding: 10px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }

    .controls button { font-weight: 700 }
  </style>
</head>

<body>
  <div id="app">
    <div class="top">
      <div>
        <h1>Setlist Lyrics</h1>
        <div style="color:var(--muted)">Simple lyrics + setlists</div>
      </div>
      <button type="button" class="primary" id="btnNew">+ Song</button>
    </div>

    <div class="sync-card" id="syncCard">
      <h2>Cloud sync (PC ↔ iPhone)</h2>
      <p class="sync-hint">
        Free <a href="https://jsonbin.io" target="_blank" rel="noopener" style="color:var(--accent)">JSONBin.io</a>
        account → copy your <strong>X-Master-Key</strong> → paste below on <em>both</em> devices.
        Use the same Sync ID on each device.
      </p>
      <div class="sync-row">
        <input type="password" id="syncApiKey" placeholder="JSONBin X-Master-Key" autocomplete="off">
      </div>
      <div class="sync-row">
        <input type="text" id="syncBinId" placeholder="Sync ID (bin id)" autocomplete="off">
        <button type="button" id="btnSyncSave">Save</button>
      </div>
      <div class="sync-row">
        <button type="button" id="btnSyncNew">Create new cloud backup</button>
        <button type="button" id="btnSyncNow">Sync now</button>
      </div>
      <div id="syncIdDisplay" class="hidden">
        <div style="color:var(--muted);font-size:14px">Your Sync ID (copy to your other device):</div>
        <div class="sync-id-box" id="syncIdText"></div>
        <button type="button" id="btnCopySyncId">Copy Sync ID</button>
      </div>
      <div class="sync-status" id="syncStatus">Sync not configured</div>
    </div>

    <div class="toolbar">
      <input id="search" placeholder="Search songs...">
      <button type="button" id="btnExport">Export</button>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
      <button type="button" id="btnImport">Import</button>
    </div>

    <div id="list"></div>

    <div id="panelStash">
    <div id="editor" class="hidden inline-panel">
      <div class="card">
        <h2>Song</h2>
        <input id="songTitle" placeholder="Song title">
        <br><br>
        <input id="songArtist" placeholder="Artist">
        <br><br>
        <textarea id="songLyrics" placeholder="Paste lyrics here..."></textarea>
        <br><br>
        <div style="display:flex;gap:10px">
          <button type="button" class="primary" id="btnSave">Save</button>
          <button type="button" id="btnCancel">Cancel</button>
        </div>
      </div>
    </div>

    <div id="viewer" class="hidden inline-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <h2 id="viewTitle"></h2>
          <div id="viewArtist" style="color:var(--muted)"></div>
        </div>
        <button type="button" id="btnCloseViewer">Close</button>
      </div>
      <pre id="lyrics"></pre>
      <div class="controls">
        <button type="button" id="btnFontDown">A-</button>
        <button type="button" id="btnFontUp">A+</button>
      </div>
    </div>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_SONGS = "songs";
      var STORAGE_FONT = "fontSize";
      var STORAGE_UPDATED = "songsUpdatedAt";
      var STORAGE_SYNC_KEY = "jsonbinMasterKey";
      var STORAGE_SYNC_BIN = "jsonbinBinId";
      var JSONBIN_API = "https://api.jsonbin.io/v3/b";

      var songs = [];
      var localUpdatedAt = 0;
      try {
        songs = JSON.parse(localStorage.getItem(STORAGE_SONGS) || "[]");
        if (!Array.isArray(songs)) songs = [];
        localUpdatedAt = Number(localStorage.getItem(STORAGE_UPDATED) || 0) || 0;
      } catch (e) {
        songs = [];
      }

      var editing = null;
      var fontSize = Number(localStorage.getItem(STORAGE_FONT) || 20);
      if (!isFinite(fontSize)) fontSize = 20;

      var listEl = document.getElementById("list");
      var editorEl = document.getElementById("editor");
      var viewerEl = document.getElementById("viewer");
      var stashEl = document.getElementById("panelStash");
      var toolbarEl = document.querySelector(".toolbar");
      var syncStatusEl = document.getElementById("syncStatus");
      var syncPushTimer = null;
      var syncBusy = false;
      var activeCard = null;

      function clearActiveCard() {
        if (activeCard) {
          activeCard.classList.remove("is-active");
          activeCard = null;
        }
      }

      function stashPanels() {
        clearActiveCard();
        editorEl.classList.add("hidden");
        viewerEl.classList.add("hidden");
        if (editorEl.parentNode !== stashEl) stashEl.appendChild(editorEl);
        if (viewerEl.parentNode !== stashEl) stashEl.appendChild(viewerEl);
      }

      function showPanel(panel, anchor) {
        stashPanels();
        panel.classList.remove("hidden");
        var after = anchor || toolbarEl;
        if (after && after.parentNode) {
          after.insertAdjacentElement("afterend", panel);
        } else {
          listEl.insertAdjacentElement("afterbegin", panel);
        }
        if (anchor && anchor.classList && anchor.classList.contains("card")) {
          activeCard = anchor;
          anchor.classList.add("is-active");
        }
        requestAnimationFrame(function () {
          panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });
      }

      function getSyncConfig() {
        return {
          key: (localStorage.getItem(STORAGE_SYNC_KEY) || "").trim(),
          binId: (localStorage.getItem(STORAGE_SYNC_BIN) || "").trim()
        };
      }

      function syncConfigured() {
        var c = getSyncConfig();
        return !!(c.key && c.binId);
      }

      function setSyncStatus(msg, type) {
        syncStatusEl.textContent = msg;
        syncStatusEl.className = "sync-status" + (type ? " " + type : "");
      }

      function payload() {
        return {
          songs: songs,
          fontSize: fontSize,
          updatedAt: localUpdatedAt
        };
      }

      function applyPayload(data, source) {
        if (!data || typeof data !== "object") return false;
        var remoteSongs = Array.isArray(data.songs) ? data.songs : [];
        var remoteAt = Number(data.updatedAt) || 0;
        var remoteFont = Number(data.fontSize);
        var changed = false;

        if (remoteAt > localUpdatedAt) {
          songs = remoteSongs;
          localUpdatedAt = remoteAt;
          if (isFinite(remoteFont)) fontSize = remoteFont;
          changed = true;
        } else if (remoteAt < localUpdatedAt) {
          return false;
        } else if (remoteAt === localUpdatedAt && remoteAt > 0) {
          return false;
        } else {
          var byId = {};
          songs.forEach(function (s) { if (s && s.id) byId[s.id] = s; });
          remoteSongs.forEach(function (s) { if (s && s.id) byId[s.id] = s; });
          var merged = Object.keys(byId).map(function (k) { return byId[k]; });
          if (merged.length !== songs.length) {
            songs = merged;
            changed = true;
          }
        }

        if (changed) {
          localStorage.setItem(STORAGE_SONGS, JSON.stringify(songs));
          localStorage.setItem(STORAGE_UPDATED, String(localUpdatedAt));
          localStorage.setItem(STORAGE_FONT, String(fontSize));
          updateFont();
          if (editorEl.classList.contains("hidden") && viewerEl.classList.contains("hidden")) {
            render();
          }
          setSyncStatus("Synced from " + source + " · " + songs.length + " song(s)", "ok");
        }
        return changed;
      }

      function saveStorage() {
        localUpdatedAt = Date.now();
        localStorage.setItem(STORAGE_SONGS, JSON.stringify(songs));
        localStorage.setItem(STORAGE_UPDATED, String(localUpdatedAt));
        localStorage.setItem(STORAGE_FONT, String(fontSize));
        scheduleCloudPush();
      }

      function scheduleCloudPush() {
        if (!syncConfigured()) return;
        clearTimeout(syncPushTimer);
        syncPushTimer = setTimeout(pushToCloud, 800);
      }

      function jsonbinHeaders(key) {
        return {
          "Content-Type": "application/json",
          "X-Master-Key": key
        };
      }

      function pushToCloud() {
        var c = getSyncConfig();
        if (!c.key || !c.binId || syncBusy) return;
        syncBusy = true;
        setSyncStatus("Uploading…");

        fetch(JSONBIN_API + "/" + encodeURIComponent(c.binId), {
          method: "PUT",
          headers: jsonbinHeaders(c.key),
          body: JSON.stringify(payload())
        })
          .then(function (res) {
            if (!res.ok) throw new Error("Upload failed (" + res.status + ")");
            setSyncStatus("Cloud saved · " + new Date().toLocaleTimeString(), "ok");
          })
          .catch(function (err) {
            setSyncStatus("Upload failed: " + err.message, "err");
          })
          .finally(function () {
            syncBusy = false;
          });
      }

      function pullFromCloud(silent) {
        var c = getSyncConfig();
        if (!c.key || !c.binId) {
          if (!silent) setSyncStatus("Enter API key and Sync ID, then Save", "err");
          return Promise.resolve();
        }
        if (syncBusy) return Promise.resolve();
        syncBusy = true;
        if (!silent) setSyncStatus("Downloading…");

        return fetch(JSONBIN_API + "/" + encodeURIComponent(c.binId) + "/latest", {
          headers: { "X-Master-Key": c.key }
        })
          .then(function (res) {
            if (res.status === 404) throw new Error("Sync ID not found — check the bin id");
            if (!res.ok) throw new Error("Download failed (" + res.status + ")");
            return res.json();
          })
          .then(function (body) {
            var record = body.record;
            if (record && record.updatedAt === undefined && Array.isArray(record)) {
              record = { songs: record, updatedAt: 0, fontSize: fontSize };
            }
            var pulled = applyPayload(record, "cloud");
            if (!pulled && !silent) {
              setSyncStatus("Already up to date · " + songs.length + " song(s)", "ok");
            } else if (pulled && silent) {
              setSyncStatus("Auto-synced · " + songs.length + " song(s)", "ok");
            }
            if (localUpdatedAt > (record && record.updatedAt ? record.updatedAt : 0)) {
              return pushToCloud();
            }
          })
          .catch(function (err) {
            setSyncStatus("Sync failed: " + err.message, "err");
          })
          .finally(function () {
            syncBusy = false;
          });
      }

      function saveSyncSettings() {
        var key = document.getElementById("syncApiKey").value.trim();
        var binId = document.getElementById("syncBinId").value.trim();
        if (!key) {
          alert("Paste your JSONBin X-Master-Key first.");
          return;
        }
        if (!binId) {
          alert("Paste a Sync ID, or tap \"Create new cloud backup\" on one device first.");
          return;
        }
        localStorage.setItem(STORAGE_SYNC_KEY, key);
        localStorage.setItem(STORAGE_SYNC_BIN, binId);
        showSyncId(binId);
        setSyncStatus("Settings saved — syncing…", "ok");
        pullFromCloud(false).then(function () {
          pushToCloud();
        });
      }

      function createCloudBackup() {
        var key = document.getElementById("syncApiKey").value.trim();
        if (!key) {
          alert("Paste your JSONBin X-Master-Key first.");
          return;
        }
        localStorage.setItem(STORAGE_SYNC_KEY, key);
        setSyncStatus("Creating cloud backup…");

        fetch(JSONBIN_API, {
          method: "POST",
          headers: Object.assign(jsonbinHeaders(key), {
            "X-Bin-Name": "setlist-lyrics-sync",
            "X-Bin-Private": "true"
          }),
          body: JSON.stringify(payload())
        })
          .then(function (res) {
            if (!res.ok) throw new Error("Create failed (" + res.status + ")");
            return res.json();
          })
          .then(function (data) {
            var binId = data.metadata && data.metadata.id;
            if (!binId) throw new Error("No bin id returned");
            localStorage.setItem(STORAGE_SYNC_BIN, binId);
            document.getElementById("syncBinId").value = binId;
            showSyncId(binId);
            setSyncStatus("Created! Copy Sync ID to your other device.", "ok");
          })
          .catch(function (err) {
            setSyncStatus("Create failed: " + err.message, "err");
          });
      }

      function showSyncId(binId) {
        document.getElementById("syncIdDisplay").classList.remove("hidden");
        document.getElementById("syncIdText").textContent = binId;
      }

      function loadSyncUi() {
        var c = getSyncConfig();
        if (c.key) document.getElementById("syncApiKey").value = c.key;
        if (c.binId) {
          document.getElementById("syncBinId").value = c.binId;
          showSyncId(c.binId);
          setSyncStatus("Sync ready — " + songs.length + " song(s) local", "ok");
        }
      }

      function uid() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return Date.now().toString() + Math.random().toString(36).slice(2);
      }

      function render() {
        var q = document.getElementById("search").value.toLowerCase();
        listEl.textContent = "";

        var filtered = songs.filter(function (s) {
          return (s.title + " " + (s.artist || "") + " " + s.lyrics).toLowerCase().indexOf(q) !== -1;
        });

        if (!filtered.length) {
          var empty = document.createElement("div");
          empty.className = "card";
          empty.textContent = "No songs yet.";
          listEl.appendChild(empty);
          return;
        }

        filtered.forEach(function (song) {
          var card = document.createElement("div");
          card.className = "card";
          var h3 = document.createElement("h3");
          h3.textContent = song.title || "";
          card.appendChild(h3);
          var artist = document.createElement("div");
          artist.style.color = "var(--muted)";
          artist.textContent = song.artist || "";
          card.appendChild(artist);
          var actions = document.createElement("div");
          actions.style.cssText = "display:flex;gap:8px;margin-top:12px";

          function actionBtn(label, action) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = label;
            btn.addEventListener("click", function () {
              if (action === "open") openSong(song.id, card);
              if (action === "edit") editSong(song.id, card);
              if (action === "delete") deleteSong(song.id);
            });
            return btn;
          }

          actions.appendChild(actionBtn("Open", "open"));
          actions.appendChild(actionBtn("Edit", "edit"));
          actions.appendChild(actionBtn("Delete", "delete"));
          card.appendChild(actions);
          listEl.appendChild(card);
        });
      }

      function showList() {
        stashPanels();
        render();
      }

      function newSong() {
        editing = null;
        document.getElementById("songTitle").value = "";
        document.getElementById("songArtist").value = "";
        document.getElementById("songLyrics").value = "";
        showPanel(editorEl, toolbarEl);
      }

      function editSong(id, anchor) {
        var song = songs.find(function (s) { return s.id === id; });
        if (!song) return;
        editing = id;
        document.getElementById("songTitle").value = song.title || "";
        document.getElementById("songArtist").value = song.artist || "";
        document.getElementById("songLyrics").value = song.lyrics || "";
        showPanel(editorEl, anchor);
      }

      function cancelEdit() {
        stashPanels();
      }

      function saveSong() {
        var song = {
          id: editing || uid(),
          title: document.getElementById("songTitle").value,
          artist: document.getElementById("songArtist").value,
          lyrics: document.getElementById("songLyrics").value
        };
        if (editing) {
          songs = songs.map(function (s) { return s.id === editing ? song : s; });
        } else {
          songs.unshift(song);
        }
        saveStorage();
        cancelEdit();
        showList();
      }

      function deleteSong(id) {
        if (!confirm("Delete song?")) return;
        songs = songs.filter(function (s) { return s.id !== id; });
        saveStorage();
        render();
      }

      function openSong(id, anchor) {
        var song = songs.find(function (s) { return s.id === id; });
        if (!song) return;
        document.getElementById("viewTitle").textContent = song.title || "";
        document.getElementById("viewArtist").textContent = song.artist || "";
        document.getElementById("lyrics").textContent = song.lyrics || "";
        updateFont();
        showPanel(viewerEl, anchor);
      }

      function closeViewer() {
        stashPanels();
      }

      function updateFont() {
        document.getElementById("lyrics").style.fontSize = fontSize + "px";
        localStorage.setItem(STORAGE_FONT, String(fontSize));
        scheduleCloudPush();
      }

      function exportData() {
        var blob = new Blob([JSON.stringify(songs, null, 2)], { type: "application/json" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "setlist-backup.json";
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function importData(file) {
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = JSON.parse(reader.result);
            if (!Array.isArray(data)) throw new Error("not array");
            var count = data.length;
            var msg = songs.length
              ? "Import will replace " + songs.length + " song(s) with " + count + ". Continue?"
              : "Import " + count + " song(s)?";
            if (!confirm(msg)) return;
            songs = data;
            saveStorage();
            showList();
            if (syncConfigured()) pushToCloud();
          } catch (e) {
            alert("Invalid backup file.");
          }
        };
        reader.readAsText(file);
      }

      document.getElementById("btnNew").addEventListener("click", newSong);
      document.getElementById("btnSave").addEventListener("click", saveSong);
      document.getElementById("btnCancel").addEventListener("click", cancelEdit);
      document.getElementById("btnCloseViewer").addEventListener("click", closeViewer);
      document.getElementById("btnExport").addEventListener("click", exportData);
      document.getElementById("btnImport").addEventListener("click", function () {
        document.getElementById("importFile").click();
      });
      document.getElementById("importFile").addEventListener("change", function (e) {
        var file = e.target.files && e.target.files[0];
        e.target.value = "";
        if (file) importData(file);
      });
      document.getElementById("search").addEventListener("input", render);
      document.getElementById("btnFontDown").addEventListener("click", function () {
        fontSize -= 2;
        updateFont();
      });
      document.getElementById("btnFontUp").addEventListener("click", function () {
        fontSize += 2;
        updateFont();
      });

      document.getElementById("btnSyncSave").addEventListener("click", saveSyncSettings);
      document.getElementById("btnSyncNew").addEventListener("click", createCloudBackup);
      document.getElementById("btnSyncNow").addEventListener("click", function () {
        pullFromCloud(false).then(function () { pushToCloud(); });
      });
      document.getElementById("btnCopySyncId").addEventListener("click", function () {
        var id = document.getElementById("syncIdText").textContent;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(id).then(function () {
            setSyncStatus("Sync ID copied", "ok");
          });
        } else {
          prompt("Copy Sync ID:", id);
        }
      });

      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "visible" && syncConfigured()) {
          pullFromCloud(true);
        }
      });

      loadSyncUi();
      showList();
      updateFont();

      if (syncConfigured()) {
        pullFromCloud(true);
        setInterval(function () {
          if (syncConfigured()) pullFromCloud(true);
        }, 45000);
      }
    })();
  </script>
</body>

</html>
