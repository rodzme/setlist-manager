<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Setlist Lyrics</title>
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Setlist Lyrics">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg: #0f0f10;
      --panel: #1a1a1d;
      --text: #f4f4f5;
      --muted: #aaa;
      --line: #2d2d31;
      --accent: #f5b342;
    }
    body[data-theme="light"] {
      --bg: #f6f6f3;
      --panel: #ffffff;
      --text: #1b1b1b;
      --muted: #666;
      --line: #d7d7d1;
      --accent: #cf8c12;
    }

    * { box-sizing: border-box }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #app {
      padding: 24px 5px;
      max-width: 900px;
      margin: auto;
    }

    h1 { margin: 24px 5px 24px 0}

    p {
      margin: 14px;
      line-height: 1.6;
    }

    button, input, textarea, select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
    }

    button.primary {
      background: var(--accent);
      color: #111;
      font-weight: 700;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      position: relative;
      padding: 8px 0 16px;
    }

    .menu-wrap {
      position: relative;
    }

    #btnMenu {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      padding: 0;
      font-size: 24px;
      line-height: 1;
    }

    #menuPanel {
      position: absolute;
      right: 0;
      top: 58px;
      width: 200px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
      z-index: 30;
    }

    #menuPanel a {
      display: block;
      color: var(--text);
      text-decoration: none;
      border-radius: 10px;
      padding: 10px;
    }
    #menuPanel button {
      width: 100%;
      text-align: left;
      border: 0;
      border-radius: 10px;
      padding: 10px;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }

    #menuPanel a:hover,
    #menuPanel button:hover {
      background: #ffffff14;
    }

    .hidden { display: none }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar input {
      flex: 1;
      min-width: 160px;
    }

    .card {
      background: var(--panel);
      padding: 14px;
      border-radius: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
    }

    .group-heading {
      font-size: 0.95rem;
      margin: 22px 0 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    pre {
      white-space: pre-wrap;
      font-size: 20px;
      line-height: 1.6;
      background: var(--panel);
      padding: 18px;
      border-radius: 18px;
      overflow: auto;
    }

    textarea { width: 100%; min-height: 300px }
    input { width: 100% }

    #viewer { padding-bottom: 120px }

    .inline-panel {
      margin: 0 0 16px;
    }

    #panelStash {
      display: none;
    }

    .card.is-active {
      border-color: var(--accent);
    }

    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: #00000099;
      padding: 10px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }

    .controls button { font-weight: 700 }
  </style>
</head>

<body>
  <div id="app">
    <div class="top">
      <div>
        <h1>Setlist Lyrics</h1>
        <div style="color:var(--muted)">Simple lyrics + setlists</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button type="button" class="primary" id="btnNew">+ Song</button>
        <div class="menu-wrap">
          <button type="button" id="btnMenu" aria-expanded="false" aria-controls="menuPanel">&#9776;</button>
          <nav id="menuPanel" class="hidden">
            <a href="index.html">Songs</a>
            <a href="config.html">Cloud Sync Settings</a>
            <button type="button" id="btnTheme">Use Light Theme</button>
          </nav>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <input id="search" placeholder="Search songs...">
      <select id="groupMode">
        <option value="none">No grouping</option>
        <option value="artist">Group by artist</option>
        <option value="alpha">Group alphabetically</option>
        <option value="genre">Group by genre</option>
      </select>
      <button type="button" id="btnExport">Export</button>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
      <button type="button" id="btnImport">Import</button>
    </div>

    <div id="list"></div>

    <div id="panelStash">
      <div id="editor" class="hidden inline-panel">
        <div class="card">
          <h2>Song</h2>
          <input id="songTitle" placeholder="Song title">
          <br><br>
          <input id="songArtist" placeholder="Artist">
          <br><br>
          <input id="songGenre" placeholder="Genre (optional)">
          <br><br>
          <textarea id="songLyrics" placeholder="Paste lyrics here..."></textarea>
          <br><br>
          <div style="display:flex;gap:10px">
            <button type="button" class="primary" id="btnSave">Save</button>
            <button type="button" id="btnCancel">Cancel</button>
          </div>
        </div>
      </div>

      <div id="viewer" class="hidden inline-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div>
            <h2 id="viewTitle"></h2>
            <div id="viewArtist" style="color:var(--muted)"></div>
          </div>
          <button type="button" id="btnCloseViewer">Close</button>
        </div>
        <pre id="lyrics"></pre>
        <div class="controls">
          <button type="button" id="btnFontDown">A-</button>
          <button type="button" id="btnFontUp">A+</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_SONGS = "songs";
      var STORAGE_FONT = "fontSize";
      var STORAGE_UPDATED = "songsUpdatedAt";
      var STORAGE_GROUP = "songsGroupMode";
      var STORAGE_THEME = "appTheme";

      var songs = [];
      var localUpdatedAt = 0;
      try {
        songs = JSON.parse(localStorage.getItem(STORAGE_SONGS) || "[]");
        if (!Array.isArray(songs)) songs = [];
        localUpdatedAt = Number(localStorage.getItem(STORAGE_UPDATED) || 0) || 0;
      } catch (e) {
        songs = [];
      }

      var editing = null;
      var fontSize = Number(localStorage.getItem(STORAGE_FONT) || 20);
      if (!isFinite(fontSize)) fontSize = 20;

      var listEl = document.getElementById("list");
      var editorEl = document.getElementById("editor");
      var viewerEl = document.getElementById("viewer");
      var stashEl = document.getElementById("panelStash");
      var toolbarEl = document.querySelector(".toolbar");
      var activeCard = null;
      var menuPanel = document.getElementById("menuPanel");
      var btnMenu = document.getElementById("btnMenu");
      var btnTheme = document.getElementById("btnTheme");

      var groupModeEl = document.getElementById("groupMode");
      groupModeEl.value = localStorage.getItem(STORAGE_GROUP) || "none";
      var theme = localStorage.getItem(STORAGE_THEME) || "dark";

      function applyTheme(nextTheme) {
        theme = nextTheme === "light" ? "light" : "dark";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem(STORAGE_THEME, theme);
        btnTheme.textContent = theme === "dark" ? "Use Light Theme" : "Use Dark Theme";
      }

      function clearActiveCard() {
        if (activeCard) {
          activeCard.classList.remove("is-active");
          activeCard = null;
        }
      }

      function stashPanels() {
        clearActiveCard();
        editorEl.classList.add("hidden");
        viewerEl.classList.add("hidden");
        if (editorEl.parentNode !== stashEl) stashEl.appendChild(editorEl);
        if (viewerEl.parentNode !== stashEl) stashEl.appendChild(viewerEl);
      }

      function showPanel(panel, anchor) {
        stashPanels();
        panel.classList.remove("hidden");
        var after = anchor || toolbarEl;
        if (after && after.parentNode) {
          after.insertAdjacentElement("afterend", panel);
        } else {
          listEl.insertAdjacentElement("afterbegin", panel);
        }
        if (anchor && anchor.classList && anchor.classList.contains("card")) {
          activeCard = anchor;
          anchor.classList.add("is-active");
        }
        requestAnimationFrame(function () {
          panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });
      }

      function uid() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return Date.now().toString() + Math.random().toString(36).slice(2);
      }

      function saveStorage() {
        localUpdatedAt = Date.now();
        localStorage.setItem(STORAGE_SONGS, JSON.stringify(songs));
        localStorage.setItem(STORAGE_UPDATED, String(localUpdatedAt));
        localStorage.setItem(STORAGE_FONT, String(fontSize));
      }

      function normalize(text) {
        return (text || "").toString().trim();
      }

      function groupLabel(song, mode) {
        if (mode === "artist") return normalize(song.artist) || "Unknown Artist";
        if (mode === "genre") return normalize(song.genre) || "Unknown Genre";
        if (mode === "alpha") {
          var first = normalize(song.title).charAt(0).toUpperCase();
          return /^[A-Z]$/.test(first) ? first : "#";
        }
        return "All Songs";
      }

      function sortedSongs(items, mode) {
        return items.slice().sort(function (a, b) {
          var ta = normalize(a.title).toLowerCase();
          var tb = normalize(b.title).toLowerCase();
          if (mode === "artist") {
            var aa = normalize(a.artist).toLowerCase();
            var ab = normalize(b.artist).toLowerCase();
            if (aa < ab) return -1;
            if (aa > ab) return 1;
          }
          if (mode === "genre") {
            var ga = normalize(a.genre).toLowerCase();
            var gb = normalize(b.genre).toLowerCase();
            if (ga < gb) return -1;
            if (ga > gb) return 1;
          }
          return ta < tb ? -1 : ta > tb ? 1 : 0;
        });
      }

      function renderSongCard(song) {
        var card = document.createElement("div");
        card.className = "card";

        var h3 = document.createElement("h3");
        h3.textContent = song.title || "";
        card.appendChild(h3);

        var meta = document.createElement("div");
        meta.style.color = "var(--muted)";
        var artist = normalize(song.artist) || "Unknown Artist";
        var genre = normalize(song.genre);
        meta.textContent = genre ? artist + " � " + genre : artist;
        card.appendChild(meta);

        var actions = document.createElement("div");
        actions.style.cssText = "display:flex;gap:8px;margin-top:12px";

        function actionBtn(label, action) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = label;
          btn.addEventListener("click", function () {
            if (action === "open") openSong(song.id, card);
            if (action === "edit") editSong(song.id, card);
            if (action === "delete") deleteSong(song.id);
          });
          return btn;
        }

        actions.appendChild(actionBtn("Open", "open"));
        actions.appendChild(actionBtn("Edit", "edit"));
        actions.appendChild(actionBtn("Delete", "delete"));
        card.appendChild(actions);

        return card;
      }

      function render() {
        var q = document.getElementById("search").value.toLowerCase();
        var mode = groupModeEl.value;
        listEl.textContent = "";

        var filtered = songs.filter(function (s) {
          return (s.title + " " + (s.artist || "") + " " + (s.genre || "") + " " + s.lyrics).toLowerCase().indexOf(q) !== -1;
        });

        if (!filtered.length) {
          var empty = document.createElement("div");
          empty.className = "card";
          empty.textContent = "No songs yet.";
          listEl.appendChild(empty);
          return;
        }

        var ordered = sortedSongs(filtered, mode);
        if (mode === "none") {
          ordered.forEach(function (song) {
            listEl.appendChild(renderSongCard(song));
          });
          return;
        }

        var groups = {};
        ordered.forEach(function (song) {
          var label = groupLabel(song, mode);
          if (!groups[label]) groups[label] = [];
          groups[label].push(song);
        });

        Object.keys(groups).sort(function (a, b) {
          if (mode === "alpha") {
            if (a === "#") return 1;
            if (b === "#") return -1;
          }
          return a.toLowerCase() < b.toLowerCase() ? -1 : a.toLowerCase() > b.toLowerCase() ? 1 : 0;
        }).forEach(function (label) {
          var heading = document.createElement("div");
          heading.className = "group-heading";
          heading.textContent = label;
          listEl.appendChild(heading);

          groups[label].forEach(function (song) {
            listEl.appendChild(renderSongCard(song));
          });
        });
      }

      function showList() {
        stashPanels();
        render();
      }

      function newSong() {
        editing = null;
        document.getElementById("songTitle").value = "";
        document.getElementById("songArtist").value = "";
        document.getElementById("songGenre").value = "";
        document.getElementById("songLyrics").value = "";
        showPanel(editorEl, toolbarEl);
      }

      function editSong(id, anchor) {
        var song = songs.find(function (s) { return s.id === id; });
        if (!song) return;
        editing = id;
        document.getElementById("songTitle").value = song.title || "";
        document.getElementById("songArtist").value = song.artist || "";
        document.getElementById("songGenre").value = song.genre || "";
        document.getElementById("songLyrics").value = song.lyrics || "";
        showPanel(editorEl, anchor);
      }

      function cancelEdit() {
        stashPanels();
      }

      function saveSong() {
        var song = {
          id: editing || uid(),
          title: document.getElementById("songTitle").value,
          artist: document.getElementById("songArtist").value,
          genre: document.getElementById("songGenre").value,
          lyrics: document.getElementById("songLyrics").value
        };
        if (editing) {
          songs = songs.map(function (s) { return s.id === editing ? song : s; });
        } else {
          songs.unshift(song);
        }
        saveStorage();
        cancelEdit();
        showList();
      }

      function deleteSong(id) {
        if (!confirm("Delete song?")) return;
        songs = songs.filter(function (s) { return s.id !== id; });
        saveStorage();
        render();
      }

      function openSong(id, anchor) {
        var song = songs.find(function (s) { return s.id === id; });
        if (!song) return;
        var subtitle = normalize(song.artist) || "Unknown Artist";
        var genre = normalize(song.genre);
        if (genre) subtitle += " � " + genre;
        document.getElementById("viewTitle").textContent = song.title || "";
        document.getElementById("viewArtist").textContent = subtitle;
        document.getElementById("lyrics").textContent = song.lyrics || "";
        updateFont();
        showPanel(viewerEl, anchor);
      }

      function closeViewer() {
        stashPanels();
      }

      function updateFont() {
        document.getElementById("lyrics").style.fontSize = fontSize + "px";
        localStorage.setItem(STORAGE_FONT, String(fontSize));
      }

      function exportData() {
        var blob = new Blob([JSON.stringify(songs, null, 2)], { type: "application/json" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "setlist-backup.json";
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function importData(file) {
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var data = JSON.parse(reader.result);
            if (!Array.isArray(data)) throw new Error("not array");
            var count = data.length;
            var msg = songs.length
              ? "Import will replace " + songs.length + " song(s) with " + count + ". Continue?"
              : "Import " + count + " song(s)?";
            if (!confirm(msg)) return;
            songs = data;
            saveStorage();
            showList();
          } catch (e) {
            alert("Invalid backup file.");
          }
        };
        reader.readAsText(file);
      }

      function toggleMenu(forceOpen) {
        var open = typeof forceOpen === "boolean" ? forceOpen : menuPanel.classList.contains("hidden");
        menuPanel.classList.toggle("hidden", !open);
        btnMenu.setAttribute("aria-expanded", open ? "true" : "false");
      }

      document.getElementById("btnNew").addEventListener("click", newSong);
      document.getElementById("btnSave").addEventListener("click", saveSong);
      document.getElementById("btnCancel").addEventListener("click", cancelEdit);
      document.getElementById("btnCloseViewer").addEventListener("click", closeViewer);
      document.getElementById("btnExport").addEventListener("click", exportData);
      document.getElementById("btnImport").addEventListener("click", function () {
        document.getElementById("importFile").click();
      });
      document.getElementById("importFile").addEventListener("change", function (e) {
        var file = e.target.files && e.target.files[0];
        e.target.value = "";
        if (file) importData(file);
      });
      document.getElementById("search").addEventListener("input", render);
      groupModeEl.addEventListener("change", function () {
        localStorage.setItem(STORAGE_GROUP, groupModeEl.value);
        render();
      });
      document.getElementById("btnFontDown").addEventListener("click", function () {
        fontSize -= 2;
        updateFont();
      });
      document.getElementById("btnFontUp").addEventListener("click", function () {
        fontSize += 2;
        updateFont();
      });

      btnMenu.addEventListener("click", function (e) {
        e.stopPropagation();
        toggleMenu();
      });
      btnTheme.addEventListener("click", function () {
        applyTheme(theme === "dark" ? "light" : "dark");
      });
      document.addEventListener("click", function (e) {
        if (!menuPanel.contains(e.target) && e.target !== btnMenu) {
          toggleMenu(false);
        }
      });

      applyTheme(theme);
      showList();
      updateFont();
    })();
  </script>
</body>

</html>
