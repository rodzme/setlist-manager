<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Setlist Lyrics</title>
<meta name="theme-color" content="#111111">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Setlist Lyrics">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
--bg:#0f0f10;--panel:#1a1a1d;--text:#f4f4f5;--muted:#aaa;--line:#2d2d31;--accent:#f5b342;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#app{padding:18px;max-width:900px;margin:auto}
h1{margin:0 0 14px}
.top{display:flex;justify-content:space-between;gap:10px;align-items:center}
button,input,textarea,select{
border:1px solid var(--line);
background:var(--panel);
color:var(--text);
border-radius:14px;
padding:12px;
font-size:16px;
}
button.primary{background:var(--accent);color:#111;font-weight:700}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:160px}
.card{
background:var(--panel);
padding:14px;
border-radius:18px;
margin-bottom:12px;
border:1px solid var(--line);
}
pre{
white-space:pre-wrap;
font-size:20px;
line-height:1.6;
background:var(--panel);
padding:18px;
border-radius:18px;
overflow:auto;
}
.hidden{display:none}
textarea{width:100%;min-height:300px}
input{width:100%}
#viewer{padding-bottom:120px}
.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
background:#00000099;
padding:10px;
border-radius:999px;
backdrop-filter:blur(10px);
}
.controls button{font-weight:700}
</style>
</head>
<body>
<div id="app">
<div class="top">
<div>
<h1>Setlist Lyrics</h1>
<div style="color:var(--muted)">Simple lyrics + setlists</div>
</div>
<button type="button" class="primary" id="btnNew">+ Song</button>
</div>

<div class="toolbar">
<input id="search" placeholder="Search songs...">
<button type="button" id="btnExport">Export</button>
<input type="file" id="importFile" accept="application/json,.json" hidden>
<button type="button" id="btnImport">Import</button>
</div>

<div id="list"></div>

<div id="editor" class="hidden">
<div class="card">
<h2>Song</h2>
<input id="songTitle" placeholder="Song title">
<br><br>
<input id="songArtist" placeholder="Artist">
<br><br>
<textarea id="songLyrics" placeholder="Paste lyrics here..."></textarea>
<br><br>
<div style="display:flex;gap:10px">
<button type="button" class="primary" id="btnSave">Save</button>
<button type="button" id="btnCancel">Cancel</button>
</div>
</div>
</div>

<div id="viewer" class="hidden">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div>
<h2 id="viewTitle"></h2>
<div id="viewArtist" style="color:var(--muted)"></div>
</div>
<button type="button" id="btnCloseViewer">Close</button>
</div>

<pre id="lyrics"></pre>

<div class="controls">
<button type="button" id="btnFontDown">A-</button>
<button type="button" id="btnFontUp">A+</button>
</div>
</div>
</div>

<script>
(function () {
  var songs = [];
  try {
    songs = JSON.parse(localStorage.getItem("songs") || "[]");
    if (!Array.isArray(songs)) songs = [];
  } catch (e) {
    songs = [];
  }

  var editing = null;
  var fontSize = Number(localStorage.getItem("fontSize") || 20);
  if (!isFinite(fontSize)) fontSize = 20;

  var listEl = document.getElementById("list");
  var editorEl = document.getElementById("editor");
  var viewerEl = document.getElementById("viewer");

  function saveStorage() {
    localStorage.setItem("songs", JSON.stringify(songs));
  }

  function uid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return Date.now().toString() + Math.random().toString(36).slice(2);
  }

  function render() {
    var q = document.getElementById("search").value.toLowerCase();
    listEl.textContent = "";

    var filtered = songs.filter(function (s) {
      return (s.title + " " + (s.artist || "") + " " + s.lyrics).toLowerCase().indexOf(q) !== -1;
    });

    if (!filtered.length) {
      var empty = document.createElement("div");
      empty.className = "card";
      empty.textContent = "No songs yet.";
      listEl.appendChild(empty);
      return;
    }

    filtered.forEach(function (song) {
      var card = document.createElement("div");
      card.className = "card";

      var h3 = document.createElement("h3");
      h3.textContent = song.title || "";
      card.appendChild(h3);

      var artist = document.createElement("div");
      artist.style.color = "var(--muted)";
      artist.textContent = song.artist || "";
      card.appendChild(artist);

      var actions = document.createElement("div");
      actions.style.cssText = "display:flex;gap:8px;margin-top:12px";

      function actionBtn(label, action) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = label;
        btn.addEventListener("click", function () {
          if (action === "open") openSong(song.id);
          if (action === "edit") editSong(song.id);
          if (action === "delete") deleteSong(song.id);
        });
        return btn;
      }

      actions.appendChild(actionBtn("Open", "open"));
      actions.appendChild(actionBtn("Edit", "edit"));
      actions.appendChild(actionBtn("Delete", "delete"));
      card.appendChild(actions);
      listEl.appendChild(card);
    });
  }

  function showList() {
    editorEl.classList.add("hidden");
    viewerEl.classList.add("hidden");
    render();
  }

  function newSong() {
    editing = null;
    document.getElementById("songTitle").value = "";
    document.getElementById("songArtist").value = "";
    document.getElementById("songLyrics").value = "";
    editorEl.classList.remove("hidden");
    viewerEl.classList.add("hidden");
  }

  function editSong(id) {
    var song = songs.find(function (s) { return s.id === id; });
    if (!song) return;
    editing = id;
    document.getElementById("songTitle").value = song.title || "";
    document.getElementById("songArtist").value = song.artist || "";
    document.getElementById("songLyrics").value = song.lyrics || "";
    editorEl.classList.remove("hidden");
    viewerEl.classList.add("hidden");
  }

  function cancelEdit() {
    editorEl.classList.add("hidden");
  }

  function saveSong() {
    var song = {
      id: editing || uid(),
      title: document.getElementById("songTitle").value,
      artist: document.getElementById("songArtist").value,
      lyrics: document.getElementById("songLyrics").value
    };

    if (editing) {
      songs = songs.map(function (s) { return s.id === editing ? song : s; });
    } else {
      songs.unshift(song);
    }

    saveStorage();
    cancelEdit();
    showList();
  }

  function deleteSong(id) {
    if (!confirm("Delete song?")) return;
    songs = songs.filter(function (s) { return s.id !== id; });
    saveStorage();
    render();
  }

  function openSong(id) {
    var song = songs.find(function (s) { return s.id === id; });
    if (!song) return;
    viewerEl.classList.remove("hidden");
    editorEl.classList.add("hidden");
    document.getElementById("viewTitle").textContent = song.title || "";
    document.getElementById("viewArtist").textContent = song.artist || "";
    document.getElementById("lyrics").textContent = song.lyrics || "";
    updateFont();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function closeViewer() {
    viewerEl.classList.add("hidden");
  }

  function updateFont() {
    document.getElementById("lyrics").style.fontSize = fontSize + "px";
    localStorage.setItem("fontSize", fontSize);
  }

  function exportData() {
    var blob = new Blob([JSON.stringify(songs, null, 2)], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "setlist-backup.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error("not array");
        var count = data.length;
        var msg = songs.length
          ? "Import will replace " + songs.length + " song(s) with " + count + ". Continue?"
          : "Import " + count + " song(s)?";
        if (!confirm(msg)) return;
        songs = data;
        saveStorage();
        showList();
      } catch (e) {
        alert("Invalid backup file.");
      }
    };
    reader.readAsText(file);
  }

  document.getElementById("btnNew").addEventListener("click", newSong);
  document.getElementById("btnSave").addEventListener("click", saveSong);
  document.getElementById("btnCancel").addEventListener("click", cancelEdit);
  document.getElementById("btnCloseViewer").addEventListener("click", closeViewer);
  document.getElementById("btnExport").addEventListener("click", exportData);
  document.getElementById("btnImport").addEventListener("click", function () {
    document.getElementById("importFile").click();
  });
  document.getElementById("importFile").addEventListener("change", function (e) {
    var file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (file) importData(file);
  });
  document.getElementById("search").addEventListener("input", render);
  document.getElementById("btnFontDown").addEventListener("click", function () {
    fontSize -= 2;
    updateFont();
  });
  document.getElementById("btnFontUp").addEventListener("click", function () {
    fontSize += 2;
    updateFont();
  });

  showList();
  updateFont();
})();
</script>
</body>
</html>
